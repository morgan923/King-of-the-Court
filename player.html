<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brevard Volleyball - Player</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; }
.app { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
.header { text-align: center; margin-bottom: 2rem; border-bottom: 3px solid #1a56db; padding-bottom: 1rem; }
.header h1 { font-size: 32px; font-weight: 700; color: #1a56db; margin-bottom: 4px; }
.card { background: #fff; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e5e4e0; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
.btn { padding: 10px 16px; font-size: 13px; cursor: pointer; border: 1px solid #d5d4d0; border-radius: 8px; background: #fff; font-weight: 500; }
.btn:hover { background: #f5f4f0; }
.btn.primary { background: #1a56db; color: #fff; border-color: #1a56db; }
.btn.primary:hover { background: #1e40af; }
.tour-card { background: #fff; border: 1px solid #e5e4e0; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; cursor: pointer; }
.tour-card:hover { border-color: #1a56db; box-shadow: 0 2px 8px rgba(26,86,219,0.1); }
.game-card { border: 1px solid #eeede9; border-radius: 8px; padding: 1rem; margin-bottom: 8px; cursor: pointer; background: #faf9f7; }
.game-card:hover { background: #f0f9ff; border-color: #1a56db; }
.hidden { display: none; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; }
.overlay.active { display: block; }
.modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border-radius: 12px; padding: 2rem; z-index: 101; max-width: 400px; width: 90%; display: none; }
.modal.active { display: block; }
.score-display { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; margin-bottom: 1rem; border: 1px solid #e5e4e0; border-radius: 8px; }
.score-team { padding: 1rem; text-align: center; background: #faf9f7; }
.score-team.winning { background: #f0fdf4; }
.score-val { font-size: 36px; font-weight: 800; margin: 0.5rem 0; color: #1a56db; }
.score-team.winning .score-val { color: #16a34a; }
.score-btn { width: 100%; height: 48px; font-size: 18px; font-weight: 700; border: none; cursor: pointer; border-radius: 6px; margin-bottom: 6px; }
.score-plus { background: #1a1a1a; color: #fff; }
.score-minus { background: #f3f4f6; color: #6b7280; }
.success { color: #16a34a; padding: 12px; background: #f0fdf4; border-radius: 8px; margin: 8px 0; font-size: 13px; }
.error { color: #dc2626; padding: 12px; background: #fee2e2; border-radius: 8px; margin: 8px 0; font-size: 13px; }
.info { color: #0369a1; padding: 12px; background: #e0f2fe; border-radius: 8px; margin: 8px 0; font-size: 13px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🏐 Brevard Volleyball</h1>
    <p>Select tournament and keep score</p>
  </div>

  <!-- Home Screen -->
  <div id="homeScreen">
    <div class="card">
      <div class="card-title">Active Tournaments</div>
    </div>
    <div id="firebaseStatus"></div>
    <div id="tourList"></div>
  </div>

  <!-- Tournament Screen -->
  <div id="tourScreen" class="hidden">
    <div style="margin-bottom: 1rem;">
      <button class="btn" onclick="goHome()">← Back</button>
    </div>
    <div class="card">
      <div class="card-title" id="tourName"></div>
      <div style="font-size: 12px; color: #666; margin-bottom: 1rem;" id="poolInfo"></div>
      <div id="gamesList"></div>
    </div>
  </div>
</div>

<!-- Scoring Modal -->
<div class="overlay" id="overlay"></div>
<div class="modal" id="modal">
  <button onclick="closeModal()" style="position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 20px; cursor: pointer;">✕</button>
  <div style="font-weight: 600; margin-bottom: 1rem; font-size: 14px;" id="gameTitle"></div>
  
  <div class="score-display">
    <div class="score-team" id="team1">
      <div id="team1Name" style="font-size: 12px; font-weight: 600; margin-bottom: 8px;"></div>
      <div class="score-val" id="score1">0</div>
      <button class="score-btn score-plus" onclick="tapScore(1, 1)">+1</button>
      <button class="score-btn score-minus" onclick="tapScore(1, -1)">−1</button>
    </div>
    <div style="display: flex; align-items: center; justify-content: center; font-weight: 700; color: #aaa;">VS</div>
    <div class="score-team" id="team2">
      <div id="team2Name" style="font-size: 12px; font-weight: 600; margin-bottom: 8px;"></div>
      <div class="score-val" id="score2">0</div>
      <button class="score-btn score-plus" onclick="tapScore(2, 1)">+1</button>
      <button class="score-btn score-minus" onclick="tapScore(2, -1)">−1</button>
    </div>
  </div>
  
  <button class="btn primary" style="width: 100%;" onclick="submitScore()">Submit Score</button>
</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
let firebaseReady = false;
let db = null;
let currentTourId = null;
let currentGameId = null;
let currentScore = { s1: 0, s2: 0 };
let currentGame = null;

const firebaseConfig = {
  apiKey: "AIzaSyBQAx2DK8mm7lyGTqaqhWYfTTTBc3DznUg",
  authDomain: "kob-tournament-d7241.firebaseapp.com",
  projectId: "kob-tournament-d7241",
  storageBucket: "kob-tournament-d7241.appspot.com",
  messagingSenderId: "147933432566",
  appId: "1:147933432566:web:9f4377719d51b058b9fad7"
};

// Initialize Firebase
function initFirebase() {
  try {
    console.log('Initializing Firebase...');
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
    console.log('Firebase initialized successfully');
    document.getElementById('firebaseStatus').innerHTML = '<div class="success">✓ Firebase connected</div>';
  } catch (e) {
    console.error('Firebase error:', e);
    firebaseReady = false;
    document.getElementById('firebaseStatus').innerHTML = '<div class="error">❌ Firebase error: ' + e.message + '</div>';
  }
}

function goHome() {
  document.getElementById('homeScreen').classList.remove('hidden');
  document.getElementById('tourScreen').classList.add('hidden');
  loadTournaments();
}

async function loadTournaments() {
  try {
    if (!firebaseReady || !db) {
      console.error('Firebase not ready');
      document.getElementById('tourList').innerHTML = '<div class="info">Loading Firebase...</div>';
      return;
    }

    console.log('Loading tournaments...');
    const snap = await db.collection('tournaments').where('status', 'in', ['setup', 'pools_created', 'round2']).get();
    
    console.log('Found', snap.size, 'tournaments');
    
    let html = '';
    snap.forEach(doc => {
      const data = doc.data();
      console.log('Tournament:', data.name, 'Status:', data.status);
      html += `
        <div class="tour-card" onclick="selectTour('${doc.id}')">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <div class="card-title" style="margin-bottom: 0;">${data.name}</div>
            <div style="font-size: 11px; background: #e8f0fe; color: #1a56db; padding: 3px 8px; border-radius: 6px; font-weight: 600;">● Active</div>
          </div>
          <div style="font-size: 12px; color: #666;">${data.playerCount} players · ${data.date}</div>
        </div>
      `;
    });
    
    if (!html) {
      html = '<div class="card"><p style="text-align: center; color: #aaa;">No active tournaments</p></div>';
    }
    
    document.getElementById('tourList').innerHTML = html;
  } catch (e) {
    console.error('Error loading tournaments:', e);
    document.getElementById('tourList').innerHTML = '<div class="error">Error: ' + e.message + '</div>';
  }
}

async function selectTour(tourId) {
  currentTourId = tourId;
  try {
    if (!firebaseReady || !db) return;
    
    const doc = await db.collection('tournaments').doc(tourId).get();
    const data = doc.data();
    
    document.getElementById('tourName').textContent = data.name;
    document.getElementById('poolInfo').textContent = `${data.playerCount} players · ${data.date}`;
    
    document.getElementById('homeScreen').classList.add('hidden');
    document.getElementById('tourScreen').classList.remove('hidden');
    
    loadGames();
  } catch (e) {
    console.error('Error:', e);
    alert('Error: ' + e.message);
  }
}

async function loadGames() {
  try {
    if (!firebaseReady || !db) return;
    
    const doc = await db.collection('tournaments').doc(currentTourId).get();
    const data = doc.data();
    const poolsJson = data.poolsJson;
    
    if (!poolsJson) {
      document.getElementById('gamesList').innerHTML = '<p style="text-align: center; color: #aaa;">Waiting for admin to create pools...</p>';
      return;
    }
    
    const pools = JSON.parse(poolsJson);
    if (pools.length === 0) {
      document.getElementById('gamesList').innerHTML = '<p style="text-align: center; color: #aaa;">No pools yet</p>';
      return;
    }
    
    const pool = pools[0]; // Show first pool
    const games = [
      { id: 'g1', t1: [pool[0], pool[1]], t2: [pool[2], pool[3]] },
      { id: 'g2', t1: [pool[0], pool[2]], t2: [pool[1], pool[3]] },
      { id: 'g3', t1: [pool[0], pool[3]], t2: [pool[1], pool[2]] }
    ];
    
    if (pool.length === 5) {
      games.push({ id: 'g4', t1: [pool[0], pool[4]], t2: [pool[1], pool[3]] });
      games.push({ id: 'g5', t1: [pool[2], pool[4]], t2: [pool[3], pool[1]] });
    }
    
    let html = '';
    games.forEach(game => {
      html += `
        <div class="game-card" onclick="openScoring('${game.id}', '${game.t1.join(' & ')}', '${game.t2.join(' & ')}')">
          <div style="display: flex; align-items: center; justify-content: space-between;">
            <div style="flex: 1; font-size: 13px; font-weight: 500;">${game.t1.join(' & ')}</div>
            <div style="font-weight: 600; color: #1a56db; min-width: 40px; text-align: center;">–</div>
            <div style="flex: 1; text-align: right; font-size: 13px; font-weight: 500;">${game.t2.join(' & ')}</div>
          </div>
        </div>
      `;
    });
    
    document.getElementById('gamesList').innerHTML = html;
  } catch (e) {
    console.error('Error:', e);
    document.getElementById('gamesList').innerHTML = '<div class="error">Error: ' + e.message + '</div>';
  }
}

function openScoring(gameId, team1, team2) {
  currentGameId = gameId;
  currentGame = { team1, team2 };
  currentScore = { s1: 0, s2: 0 };
  
  document.getElementById('gameTitle').textContent = `${team1} vs ${team2}`;
  document.getElementById('team1Name').textContent = team1;
  document.getElementById('team2Name').textContent = team2;
  document.getElementById('score1').textContent = '0';
  document.getElementById('score2').textContent = '0';
  
  updateTeamStyles();
  document.getElementById('overlay').classList.add('active');
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('modal').classList.remove('active');
}

function tapScore(team, delta) {
  const key = team === 1 ? 's1' : 's2';
  currentScore[key] = Math.max(0, Math.min(25, currentScore[key] + delta));
  document.getElementById(`score${team}`).textContent = currentScore[key];
  updateTeamStyles();
}

function updateTeamStyles() {
  document.getElementById('team1').classList.toggle('winning', currentScore.s1 > currentScore.s2);
  document.getElementById('team2').classList.toggle('winning', currentScore.s2 > currentScore.s1);
}

async function submitScore() {
  try {
    if (!firebaseReady || !db) return;
    
    const t1 = currentGame.team1.split(' & ');
    const t2 = currentGame.team2.split(' & ');
    
    await db.collection('tournaments').doc(currentTourId).collection('scores').doc(currentGameId).set({
      gameId: currentGameId,
      t1: t1,
      s1: currentScore.s1,
      t2: t2,
      s2: currentScore.s2,
      submittedAt: new Date()
    });
    
    console.log('Score submitted');
    closeModal();
    loadGames();
  } catch (e) {
    console.error('Error:', e);
    alert('Error submitting score: ' + e.message);
  }
}

// Initialize on page load
window.addEventListener('load', () => {
  initFirebase();
  loadTournaments();
});
</script>
</body>
</html>
