<script>
let firebaseReady = false;
let db = null;
let currentTourId = null;
let currentGameId = null;
let currentScore = { s1: 0, s2: 0 };
let currentGame = null;
let poolScoringRules = {};
let currentPools = null;
let currentPlayerPool = null;

// Track which round we're viewing
window.currentRound = 1;

const firebaseConfig = {
  apiKey: "AIzaSyBQAx2DK8mm7lyGTqaqhWYfTTTBc3DznUg",
  authDomain: "kob-tournament-d7241.firebaseapp.com",
  projectId: "kob-tournament-d7241",
  storageBucket: "kob-tournament-d7241.appspot.com",
  messagingSenderId: "147933432566",
  appId: "1:147933432566:web:9f4377719d51b058b9fad7"
};

// Initialize Firebase
function initFirebase() {
  try {
    console.log('Initializing Firebase...');
    if (firebase.apps.length === 0) {
      firebase.initializeApp(firebaseConfig);
      console.log('Firebase app initialized');
    } else {
      console.log('Firebase app already initialized');
    }
    db = firebase.firestore();
    firebaseReady = true;
    console.log('Firebase initialized successfully');
    document.getElementById('firebaseStatus').innerHTML = '<div class="success">✓ Firebase connected</div>';
  } catch (e) {
    console.error('Firebase error:', e);
    firebaseReady = false;
    document.getElementById('firebaseStatus').innerHTML = '<div class="error">❌ Firebase error: ' + e.message + '</div>';
  }
}

function goHome() {
  // Clean up listener when leaving tournament
  if (scoreListener) {
    scoreListener();
    scoreListener = null;
  }
  document.getElementById('homeScreen').classList.remove('hidden');
  document.getElementById('tourScreen').classList.add('hidden');
  loadTournaments();
}

async function loadTournaments() {
  try {
    console.log('=== loadTournaments started ===');
    console.log('firebaseReady:', firebaseReady, 'db:', !!db);
    
    if (!firebaseReady || !db) {
      console.error('Firebase not ready. firebaseReady:', firebaseReady, 'db:', !!db);
      document.getElementById('tourList').innerHTML = '<div class="info">Waiting for Firebase to connect...</div>';
      setTimeout(() => loadTournaments(), 2000);
      return;
    }

    console.log('Fetching tournaments from Firestore...');
    const snap = await db.collection('tournaments').get();
    
    console.log('✓ Got snapshot. Found', snap.size, 'total tournaments');
    
    let html = '';
    snap.forEach(doc => {
      const data = doc.data();
      console.log('Tournament found:', {
        id: doc.id,
        name: data.name,
        status: data.status,
        hasPoolsJson: !!data.poolsJson,
        playerCount: data.playerCount,
        date: data.date
      });
      
      // Show tournaments that have pools (poolsJson exists)
      if (data.poolsJson) {
        console.log('✓ Showing tournament:', data.name);
        html += `
          <div class="tour-card" onclick="selectTour('${doc.id}')">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
              <div class="card-title" style="margin-bottom: 0;">${data.name}</div>
              <div style="font-size: 11px; background: #e8f0fe; color: #1a56db; padding: 3px 8px; border-radius: 6px; font-weight: 600;">● Active</div>
            </div>
            <div style="font-size: 12px; color: #666;">${data.playerCount || 0} players · ${data.date || 'N/A'}</div>
          </div>
        `;
      } else {
        console.log('✗ Skipped tournament:', data.name, '(no poolsJson)');
      }
    });
    
    if (!html) {
      html = '<div class="card"><p style="text-align: center; color: #aaa;">No active tournaments yet. Ask admin to:<br/>1. Create tournament<br/>2. Generate Round 1 Pools</p></div>';
    }
    
    console.log('Setting tourList HTML');
    document.getElementById('tourList').innerHTML = html;
    console.log('=== loadTournaments completed ===');
  } catch (e) {
    console.error('Error loading tournaments:', e);
    console.error('Error code:', e.code);
    console.error('Error message:', e.message);
    document.getElementById('tourList').innerHTML = '<div class="error">Error: ' + e.message + '<br/><small>' + e.code + '</small></div>';
  }
}

async function selectTour(tourId) {
  currentTourId = tourId;
  try {
    if (!firebaseReady || !db) return;
    
    const doc = await db.collection('tournaments').doc(tourId).get();
    const data = doc.data();
    
    document.getElementById('tourName').textContent = data.name;
    document.getElementById('poolInfo').textContent = `${data.playerCount} players · ${data.date}`;
    
    // Load scoring rules and pools
    poolScoringRules = data.poolScoringRules || {};
    currentPools = data.poolsJson ? JSON.parse(data.poolsJson) : null;
    
    // Show R2 tab if Round 2 exists
    if (data.r2poolsJson) {
      document.getElementById('r2TabBtn').style.display = 'block';
    } else {
      document.getElementById('r2TabBtn').style.display = 'none';
    }
    
    document.getElementById('homeScreen').classList.add('hidden');
    document.getElementById('tourScreen').classList.remove('hidden');
    
    // Load all content
    await loadRankings();
    await loadGamesByRound('r1');
    if (data.r2poolsJson) {
      await loadGamesByRound('r2');
    }
    
    // Set up real-time listener (only once per tournament)
    listenToScores();
  } catch (e) {
    console.error('Error:', e);
    alert('Error: ' + e.message);
  }
}

function playerShowTab(tab) {
  // Hide all tabs
  document.getElementById('rankingsTab').classList.add('hidden');
  document.getElementById('r1Tab').classList.add('hidden');
  document.getElementById('r2Tab').classList.add('hidden');
  
  // Deactivate all buttons
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  
  // Show selected tab
  if (tab === 'rankings') {
    document.getElementById('rankingsTab').classList.remove('hidden');
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
  } else if (tab === 'r1') {
    document.getElementById('r1Tab').classList.remove('hidden');
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
  } else if (tab === 'r2') {
    document.getElementById('r2Tab').classList.remove('hidden');
    document.querySelectorAll('.tab-btn')[2].classList.add('active');
  }
}

async function loadRankings() {
  try {
    if (!firebaseReady || !db || !currentTourId) return;
    
    const doc = await db.collection('tournaments').doc(currentTourId).get();
    const data = doc.data();
    const players = data.players || [];
    
    // Calculate stats for each player
    const playerStats = {};
    players.forEach(p => {
      playerStats[p] = { wins: 0, losses: 0, pf: 0, pa: 0 };
    });

    // Get all scores (both R1 and R2)
    const scoresSnap = await db.collection('tournaments').doc(currentTourId).collection('scores').get();
    scoresSnap.forEach(doc => {
      const score = doc.data();
      if (score.t1 && score.t2) {
        score.t1.forEach(p => {
          if (playerStats[p]) {
            playerStats[p].pf += score.s1;
            playerStats[p].pa += score.s2;
            if (score.s1 > score.s2) playerStats[p].wins++;
            else if (score.s1 < score.s2) playerStats[p].losses++;
          }
        });
        
        score.t2.forEach(p => {
          if (playerStats[p]) {
            playerStats[p].pf += score.s2;
            playerStats[p].pa += score.s1;
            if (score.s2 > score.s1) playerStats[p].wins++;
            else if (score.s2 < score.s1) playerStats[p].losses++;
          }
        });
      }
    });

    // Rank players
    const ranked = players.map(p => ({
      name: p,
      ...playerStats[p],
      diff: playerStats[p].pf - playerStats[p].pa
    })).sort((a, b) => {
      if (a.wins !== b.wins) return b.wins - a.wins;
      if (a.losses !== b.losses) return a.losses - b.losses;
      return b.diff - a.diff;
    });

    let html = '';
    ranked.forEach((r, i) => {
      html += `<tr><td>${i + 1}</td><td style="font-weight: 600;">${r.name}</td><td>${r.wins}</td><td>${r.losses}</td><td>${r.diff > 0 ? '+' : ''}${r.diff}</td><td>${r.pf}</td><td>${r.pa}</td></tr>`;
    });
    
    document.getElementById('rankingsList').innerHTML = html;
  } catch (e) {
    console.error('Error:', e);
  }
}

async function loadGamesByRound(round) {
  try {
    if (!firebaseReady || !db) return;
    
    const doc = await db.collection('tournaments').doc(currentTourId).get();
    const data = doc.data();
    const poolsJson = round === 'r1' ? data.poolsJson : data.r2poolsJson;
    
    if (!poolsJson) {
      const message = round === 'r1' ? 'Waiting for admin to create Round 1 pools...' : 'Round 2 pools not yet generated...';
      document.getElementById(round === 'r1' ? 'r1GamesList' : 'r2GamesList').innerHTML = '<p style="text-align: center; color: #aaa;">' + message + '</p>';
      return;
    }
    
    const pools = JSON.parse(poolsJson);
    if (pools.length === 0) {
      document.getElementById(round === 'r1' ? 'r1GamesList' : 'r2GamesList').innerHTML = '<p style="text-align: center; color: #aaa;">No pools yet</p>';
      return;
    }
    
    // Get scores for this round only
    const scoresSnap = await db.collection('tournaments').doc(currentTourId).collection('scores').get();
    const scores = {};
    scoresSnap.forEach(doc => {
      scores[doc.id] = doc.data();
    });
    
    console.log('Scores:', scores);
    
    // Generate games for ALL pools
    const allGames = [];
    let gameCounter = round === 'r2' ? 1000 : 1; // Offset R2 games to avoid conflict with R1
    
    console.log('Active pools:', pools);
    console.log('Number of pools:', pools.length);
    
    pools.forEach((pool, poolIdx) => {
      if (pool.length === 4) {
        allGames.push({ 
          id: `g${gameCounter++}`, 
          pool: poolIdx,
          poolSize: 4,
          poolLetter: String.fromCharCode(65 + poolIdx),
          t1: [pool[0], pool[1]], 
          t2: [pool[2], pool[3]] 
        });
        allGames.push({ 
          id: `g${gameCounter++}`, 
          pool: poolIdx,
          poolSize: 4,
          poolLetter: String.fromCharCode(65 + poolIdx),
          t1: [pool[0], pool[2]], 
          t2: [pool[1], pool[3]] 
        });
        allGames.push({ 
          id: `g${gameCounter++}`, 
          pool: poolIdx,
          poolSize: 4,
          poolLetter: String.fromCharCode(65 + poolIdx),
          t1: [pool[0], pool[3]], 
          t2: [pool[1], pool[2]] 
        });
      } else if (pool.length === 5) {
        allGames.push({ 
          id: `g${gameCounter++}`, 
          pool: poolIdx,
          poolSize: 5,
          poolLetter: String.fromCharCode(65 + poolIdx),
          t1: [pool[0], pool[1]], 
          t2: [pool[2], pool[3]] 
        });
        allGames.push({ 
          id: `g${gameCounter++}`, 
          pool: poolIdx,
          poolSize: 5,
          poolLetter: String.fromCharCode(65 + poolIdx),
          t1: [pool[0], pool[2]], 
          t2: [pool[1], pool[4]] 
        });
        allGames.push({ 
          id: `g${gameCounter++}`, 
          pool: poolIdx,
          poolSize: 5,
          poolLetter: String.fromCharCode(65 + poolIdx),
          t1: [pool[0], pool[3]], 
          t2: [pool[2], pool[4]] 
        });
        allGames.push({ 
          id: `g${gameCounter++}`, 
          pool: poolIdx,
          poolLetter: String.fromCharCode(65 + poolIdx),
          t1: [pool[0], pool[4]], 
          t2: [pool[1], pool[3]] 
        });
        allGames.push({ 
          id: `g${gameCounter++}`, 
          pool: poolIdx,
          poolLetter: String.fromCharCode(65 + poolIdx),
          t1: [pool[1], pool[2]], 
          t2: [pool[3], pool[4]] 
        });
      }
    });
    
    // Build HTML for all pools and games
    let html = '';
    let currentPool = null;
    
    allGames.forEach(game => {
      // Add pool header when pool changes
      if (game.pool !== currentPool) {
        if (currentPool !== null) {
          html += '</div></div>'; // Close previous pool
        }
        currentPool = game.pool;
        const roundLabel = round === 'r1' ? 'Round 1' : 'Round 2';
        html += `
          <div style="margin-bottom: 1rem;">
            <div style="font-weight: 600; font-size: 14px; margin-bottom: 0.5rem; padding: 8px; background: #f0efe9; border-radius: 6px;">
              ${roundLabel} - Pool ${game.poolLetter}
            </div>
            <div>
        `;
      }
      
      const score = scores[game.id];
      const scoreStr = score ? `${score.s1} - ${score.s2}` : '–';
      const scoreColor = score ? '#16a34a' : '#aaa';
      
      html += `
        <div class="game-card" onclick="openScoring('${game.id}', '${game.t1.join(' & ')}', '${game.t2.join(' & ')}', ${score ? score.s1 : 0}, ${score ? score.s2 : 0}, ${game.poolSize})" style="${score ? 'background: #f0fdf4; border-color: #16a34a;' : ''}">
          <div style="display: flex; align-items: center; justify-content: space-between;">
            <div style="flex: 1; font-size: 13px; font-weight: 500;">${game.t1.join(' & ')}</div>
            <div style="font-weight: 600; color: ${scoreColor}; min-width: 40px; text-align: center;">${scoreStr}</div>
            <div style="flex: 1; text-align: right; font-size: 13px; font-weight: 500;">${game.t2.join(' & ')}</div>
          </div>
        </div>
      `;
    });
    
    if (currentPool !== null) {
      html += '</div></div>'; // Close last pool
    }
    
    document.getElementById(round === 'r1' ? 'r1GamesList' : 'r2GamesList').innerHTML = html;
  } catch (e) {
    console.error('Error:', e);
    document.getElementById(round === 'r1' ? 'r1GamesList' : 'r2GamesList').innerHTML = '<div class="error">Error: ' + e.message + '</div>';
  }
}

let scoreListener = null; // Global listener reference

function listenToScores() {
  try {
    if (!firebaseReady || !db || !currentTourId) return;
    if (scoreListener) scoreListener(); // Remove old listener
    
    console.log('Starting single listener for score updates...');
    
    // Single listener that updates all visible tabs
    scoreListener = db.collection('tournaments').doc(currentTourId).collection('scores').onSnapshot(() => {
      console.log('Score update received - refreshing visible tabs');
      loadRankings();
      loadGamesByRound('r1');
      loadGamesByRound('r2');
    }, { includeMetadataChanges: false });
  } catch (e) {
    console.error('Error listening to scores:', e);
  }
}


function openScoring(gameId, team1, team2, s1 = 0, s2 = 0, poolSize = null) {
  currentGameId = gameId;
  currentGame = { team1, team2, poolSize };
  currentScore = { s1: s1, s2: s2 };
  
  document.getElementById('gameTitle').textContent = `${team1} vs ${team2}`;
  document.getElementById('team1Name').textContent = team1;
  document.getElementById('team2Name').textContent = team2;
  document.getElementById('score1').textContent = s1;
  document.getElementById('score2').textContent = s2;
  document.getElementById('directScore1').value = s1;
  document.getElementById('directScore2').value = s2;
  
  updateTeamStyles();
  updateSubmitButton();
  document.getElementById('overlay').classList.add('active');
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('modal').classList.remove('active');
}

function tapScore(team, delta) {
  const key = team === 1 ? 's1' : 's2';
  currentScore[key] = Math.max(0, Math.min(25, currentScore[key] + delta));
  document.getElementById(`score${team}`).textContent = currentScore[key];
  document.getElementById(`directScore${team}`).value = currentScore[key];
  updateTeamStyles();
  updateSubmitButton();
}

function setDirectScore(team) {
  const inputId = `directScore${team}`;
  const inputValue = parseInt(document.getElementById(inputId).value) || 0;
  const key = team === 1 ? 's1' : 's2';
  
  // Clamp between 0 and 25
  const clampedValue = Math.max(0, Math.min(25, inputValue));
  currentScore[key] = clampedValue;
  document.getElementById(`score${team}`).textContent = clampedValue;
  document.getElementById(inputId).value = clampedValue;
  updateTeamStyles();
  updateSubmitButton();
}

function updateTeamStyles() {
  document.getElementById('team1').classList.toggle('winning', currentScore.s1 > currentScore.s2);
  document.getElementById('team2').classList.toggle('winning', currentScore.s2 > currentScore.s1);
}

function isValidScore() {
  const s1 = currentScore.s1;
  const s2 = currentScore.s2;
  
  // Must have different scores
  if (s1 === s2) return false;
  
  const winner = Math.max(s1, s2);
  const loser = Math.min(s1, s2);
  
  // Get scoring rules for this pool size
  const poolSize = currentGame?.poolSize;
  let targetScore = 15;
  let maxScore = 21;
  
  if (poolSize && poolScoringRules[poolSize]) {
    targetScore = poolScoringRules[poolSize].targetScore;
    maxScore = poolScoringRules[poolSize].maxScore;
  }
  
  // Winner must be at least targetScore
  if (winner < targetScore) return false;
  
  // Must win by 2 OR reach the max score
  if (winner === maxScore) return true; // At cap
  if (winner - loser >= 2) return true; // Win by 2
  
  return false;
}

function updateSubmitButton() {
  const btn = document.querySelector('.btn.primary[onclick="submitScore()"]');
  if (isValidScore()) {
    btn.style.background = '#16a34a';
    btn.style.borderColor = '#16a34a';
    btn.disabled = false;
  } else {
    btn.style.background = '#dc2626';
    btn.style.borderColor = '#dc2626';
    btn.style.opacity = '0.5';
    btn.disabled = true;
  }
  
  // Check if switch is needed
  const combined = currentScore.s1 + currentScore.s2;
  const remainder = combined % 7;
  
  console.log('Score:', currentScore.s1, '-', currentScore.s2, 'Combined:', combined, 'Mod 7:', remainder);
  
  if (combined > 0 && combined % 7 === 0) {
    console.log('SHOWING switch button');
    document.getElementById('switchNotice').style.display = 'block';
  } else {
    console.log('HIDING switch button');
    document.getElementById('switchNotice').style.display = 'none';
  }
}

function switchSides() {
  // Swap team positions and scores
  const temp1 = currentScore.s1;
  const temp2 = currentScore.s2;
  const tempName1 = document.getElementById('team1Name').textContent;
  const tempName2 = document.getElementById('team2Name').textContent;
  
  // Swap scores
  currentScore.s1 = temp2;
  currentScore.s2 = temp1;
  
  // Update display
  document.getElementById('score1').textContent = currentScore.s1;
  document.getElementById('score2').textContent = currentScore.s2;
  document.getElementById('team1Name').textContent = tempName2;
  document.getElementById('team2Name').textContent = tempName1;
  
  // Hide the switch notice immediately
  document.getElementById('switchNotice').style.display = 'none';
  
  // Update team colors
  updateTeamStyles();
  updateSubmitButton();
  
  console.log('Sides switched!');
}

async function submitScore() {
  try {
    if (!firebaseReady || !db) {
      alert('Firebase not ready');
      return;
    }
    
    if (!isValidScore()) {
      alert('Invalid score');
      return;
    }
    
    if (!currentTourId || !currentGameId) {
      alert('Missing tournament or game ID');
      return;
    }

    const t1 = currentGame.team1.split(' & ');
    const t2 = currentGame.team2.split(' & ');
    
    console.log('Submitting score:', {
      gameId: currentGameId,
      t1: t1,
      s1: currentScore.s1,
      t2: t2,
      s2: currentScore.s2
    });

    await db.collection('tournaments').doc(currentTourId).collection('scores').doc(currentGameId).set({
      gameId: currentGameId,
      t1: t1,
      s1: currentScore.s1,
      t2: t2,
      s2: currentScore.s2,
      submittedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    console.log('Score submitted successfully');
    alert('✓ Score saved!');
    closeModal();
    
    // Immediately refresh the current tabs to show the score
    await loadRankings();
    await loadGamesByRound('r1');
    await loadGamesByRound('r2');
    // Real-time listener will keep them in sync
  } catch (e) {
    console.error('Error submitting score:', e);
    alert('Error submitting score: ' + e.message);
  }
}

// Initialize on page load
window.addEventListener('load', () => {
  initFirebase();
  loadTournaments();
});
</script>
