<script>
let currentPlayers = [];
let currentTourId = null;
let db = null;
let firebaseReady = false;

const firebaseConfig = {
  apiKey: "AIzaSyBQAx2DK8mm7lyGTqaqhWYfTTTBc3DznUg",
  authDomain: "kob-tournament-d7241.firebaseapp.com",

// Initialize Firebase
function initFirebase() {
  try {
    console.log('Initializing Firebase...');
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
    console.log('Firebase initialized successfully');
    document.getElementById('firebaseStatus').innerHTML = '<div class="success">✓ Firebase connected</div>';
  } catch (e) {
    console.error('Firebase error:', e);
    firebaseReady = false;
    document.getElementById('firebaseStatus').innerHTML = '<div class="error">❌ Firebase error: ' + e.message + '</div>';
  }
}

function showScreen(name) {
  document.getElementById('homeScreen').classList.toggle('hidden', name !== 'home');
  document.getElementById('createScreen').classList.toggle('hidden', name !== 'create');
  document.getElementById('detailScreen').classList.toggle('hidden', name !== 'detail');
}

function showHome() {
  showScreen('home');
  loadTournaments();
}

function showCreateTour() {
  currentPlayers = [];
  document.getElementById('tourName').value = '';
  document.getElementById('tourDate').value = '';
  document.getElementById('playerInput').value = '';
  document.getElementById('createErr').innerHTML = '';
  updatePlayerList();
  showScreen('create');
}

function addPlayer() {
  const name = document.getElementById('playerInput').value.trim();
  if (name && !currentPlayers.includes(name)) {
    currentPlayers.push(name);
    document.getElementById('playerInput').value = '';
    updatePlayerList();
  }
}

function updatePlayerList() {
  const list = document.getElementById('playerList');
  list.innerHTML = currentPlayers.map((p, i) => 
    `<div class="ptag">${p}<span class="x" onclick="removePlayer(${i})">✕</span></div>`
  ).join('');
  document.getElementById('playerCount').textContent = `${currentPlayers.length} players`;
}

function removePlayer(i) {
  currentPlayers.splice(i, 1);
  updatePlayerList();
}

async function createTournament() {
  const name = document.getElementById('tourName').value.trim();
  const dateInput = document.getElementById('tourDate').value;
  
  const errEl = document.getElementById('createErr');
  errEl.innerHTML = '';
  
  if (!name || !dateInput) {
    errEl.innerHTML = '<div class="error">Fill in all fields</div>';
    return;
  }
  if (currentPlayers.length < 4) {
    errEl.innerHTML = '<div class="error">Add at least 4 players</div>';
    return;
  }

  const dateObj = new Date(dateInput);
  const date = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + ' at ' + 
               dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

  const tourId = Math.random().toString(36).substring(2, 8).toUpperCase();
  
  try {
    if (!firebaseReady || !db) {
      errEl.innerHTML = '<div class="error">Firebase not connected</div>';
      return;
    }

    await db.collection('tournaments').doc(tourId).set({
      id: tourId,
      name: name,
      date: date,
      dateTime: dateInput,
      players: currentPlayers,
      playerCount: currentPlayers.length,
      createdAt: new Date(),
      status: 'setup'
    });
    
    errEl.innerHTML = '<div class="success">✓ Tournament created! ID: ' + tourId + '</div>';
    setTimeout(() => showHome(), 1500);
  } catch (e) {
    console.error('Error:', e);
    errEl.innerHTML = '<div class="error">Error: ' + e.message + '</div>';
  }
}

async function loadTournaments() {
  try {
    if (!firebaseReady || !db) {
      document.getElementById('tourList').innerHTML = '<div class="error">Firebase not ready</div>';
      return;
    }

    const snap = await db.collection('tournaments').get();
    let html = '';
    snap.forEach(doc => {
      const data = doc.data();
      html += `
        <div class="card" style="cursor: pointer;" onclick="openTour('${doc.id}')">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
              <div class="card-title">${data.name}</div>
              <div style="font-size: 12px; color: #666;">${data.playerCount} players · ${data.date}</div>
            </div>
            <div style="font-size: 12px; background: #fee2e2; color: #b91c1c; padding: 4px 8px; border-radius: 6px; font-weight: 600;">${data.status || 'setup'}</div>
          </div>
        </div>
      `;
    });
    if (!html) html = '<div class="card"><p style="text-align: center; color: #aaa;">No tournaments yet</p></div>';
    document.getElementById('tourList').innerHTML = html;
  } catch (e) {
    console.error('Error:', e);
    document.getElementById('tourList').innerHTML = '<div class="error">Error: ' + e.message + '</div>';
  }
}

async function openTour(tourId) {
  currentTourId = tourId;
  try {
    if (!firebaseReady || !db) return;
    const doc = await db.collection('tournaments').doc(tourId).get();
    const data = doc.data();
    document.getElementById('detailTitle').textContent = data.name + ' (' + data.playerCount + ' players)';
    showScreen('detail');
    loadScores();
    
    // Load finalized rankings if they exist
    if (data.r1Finalized && data.r1RankingsJson) {
      const ranked = JSON.parse(data.r1RankingsJson);
      const pools = JSON.parse(data.poolsJson);
      const poolSizes = [...new Set(pools.map(p => p.length))];
      const isEven = poolSizes.length === 1;
      
      // Display the saved rankings
      let standingsHtml = '<table class="score-table"><thead><tr><th>#</th><th>Player</th>';
      if (isEven) {
        standingsHtml += '<th>W</th><th>L</th>';
      }
      standingsHtml += '<th>Diff</th><th>PF</th><th>PA</th></tr></thead><tbody>';
      
      ranked.forEach((r, i) => {
        standingsHtml += `<tr><td>${i + 1}</td><td style="font-weight: 600;">${r.name}</td>`;
        if (isEven) {
          standingsHtml += `<td>${r.wins}W</td><td>${r.losses}L</td>`;
        }
        standingsHtml += `<td>${r.diff > 0 ? '+' : ''}${r.diff}</td><td>${r.pf}</td><td>${r.pa}</td></tr>`;
      });
      
      standingsHtml += '</tbody></table>';
      standingsHtml += '<div style="margin-top: 1rem;"><button class="btn primary" onclick="generateRound2FromRankings()">Generate Round 2 Pools & Post to Players</button></div>';
      
      document.getElementById('r1RankingsTable').innerHTML = standingsHtml;
      document.getElementById('r1FinalizeBtn').style.display = 'none';
    }
  } catch (e) {
    console.error('Error:', e);
  }
}

async function loadScores() {
  try {
    if (!firebaseReady || !db) return;
    
    const doc = await db.collection('tournaments').doc(currentTourId).get();
    const data = doc.data();
    const status = data.status;
    const currentRound = status === 'round2' ? 2 : 1;
    
    // Get pools
    const poolsJson = data.poolsJson;
    let pools = [];
    if (poolsJson) {
      pools = JSON.parse(poolsJson);
    }
    
    // Get all scores
    const scoresSnap = await db.collection('tournaments').doc(currentTourId).collection('scores').get();
    const scoresByGame = {};
    scoresSnap.forEach(scoreDoc => {
      const score = scoreDoc.data();
      scoresByGame[score.gameId] = score;
    });

    // Generate expected games for each pool
    const poolGames = {};
    pools.forEach((pool, poolIdx) => {
      const poolLetter = String.fromCharCode(65 + poolIdx);
      poolGames[poolLetter] = [];
      
      if (pool.length === 4) {
        poolGames[poolLetter] = [
          { id: `p${poolIdx}g1`, t1: [pool[0], pool[1]], t2: [pool[2], pool[3]] },
          { id: `p${poolIdx}g2`, t1: [pool[0], pool[2]], t2: [pool[1], pool[3]] },
          { id: `p${poolIdx}g3`, t1: [pool[0], pool[3]], t2: [pool[1], pool[2]] }
        ];
      } else if (pool.length === 5) {
        poolGames[poolLetter] = [
          { id: `p${poolIdx}g1`, t1: [pool[0], pool[1]], t2: [pool[2], pool[3]] },
          { id: `p${poolIdx}g2`, t1: [pool[0], pool[2]], t2: [pool[1], pool[4]] },
          { id: `p${poolIdx}g3`, t1: [pool[0], pool[3]], t2: [pool[2], pool[4]] },
          { id: `p${poolIdx}g4`, t1: [pool[0], pool[4]], t2: [pool[1], pool[3]] },
          { id: `p${poolIdx}g5`, t1: [pool[1], pool[2]], t2: [pool[3], pool[4]] }
        ];
      }
    });

    // Build pool status HTML
    let poolStatusHtml = '';
    let allGamesComplete = true;
    
    Object.keys(poolGames).sort().forEach(poolLetter => {
      const games = poolGames[poolLetter];
      let completedGames = 0;
      
      poolStatusHtml += `<div style="margin-bottom: 1.5rem; padding: 1rem; background: #faf9f7; border-radius: 8px; border-left: 4px solid #dc2626;">`;
      poolStatusHtml += `<div style="font-weight: 600; margin-bottom: 0.5rem;">Pool ${poolLetter}</div>`;
      poolStatusHtml += `<div style="font-size: 12px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 8px;">`;
      
      games.forEach(game => {
        const score = scoresByGame[game.id];
        const isComplete = !!score;
        if (isComplete) completedGames++;
        else allGamesComplete = false;
        
        const status = isComplete ? '✓ Complete' : '○ Pending';
        const statusColor = isComplete ? '#16a34a' : '#f59e0b';
        const bgColor = isComplete ? '#f0fdf4' : '#fffbeb';
        
        poolStatusHtml += `
          <div style="padding: 8px; background: ${bgColor}; border-radius: 6px; border-left: 3px solid ${statusColor}; font-size: 11px;">
            <div style="font-weight: 500; color: ${statusColor};">${status}</div>
            <div style="margin-top: 4px; color: #666;">
              ${game.t1.join(' & ')} vs ${game.t2.join(' & ')}
              ${isComplete ? `<br/><strong>${score.s1} - ${score.s2}</strong>` : ''}
            </div>
          </div>
        `;
      });
      
      poolStatusHtml += `</div>`;
      poolStatusHtml += `<div style="margin-top: 0.5rem; font-size: 11px; color: #666;">${completedGames}/${games.length} games complete</div>`;
      poolStatusHtml += `</div>`;
    });
    
    document.getElementById('gameStatusSection').innerHTML = poolStatusHtml;
    
    // Show/hide finalize button based on completion
    const finalizeSection = document.getElementById('finalizeSection');
    if (allGamesComplete && pools.length > 0) {
      finalizeSection.style.display = 'flex';
    } else {
      finalizeSection.style.display = 'none';
    }

    // Load scores table
    let html = '';
    scoresSnap.forEach(scoreDoc => {
      const scoreData = scoreDoc.data();
      const time = scoreData.submittedAt ? new Date(scoreData.submittedAt.toDate()).toLocaleTimeString() : '—';
      const round = scoreData.round || 1;
      html += `
        <tr>
          <td style="font-weight: 600;">R${round}</td>
          <td>${scoreData.t1 ? scoreData.t1.join(' & ') : '—'}</td>
          <td style="font-weight: 600;">${scoreData.s1 || 0} - ${scoreData.s2 || 0}</td>
          <td>${scoreData.t2 ? scoreData.t2.join(' & ') : '—'}</td>
          <td style="font-size: 11px;">${time}</td>
        </tr>
      `;
    });
    if (!html) html = '<tr><td colspan="5" style="text-align: center; color: #aaa;">No scores yet</td></tr>';
    document.getElementById('scoresList').innerHTML = html;
  } catch (e) {
    console.error('Error:', e);
  }
}

function showTab(tab) {
  document.getElementById('scoresTab').classList.toggle('hidden', tab !== 'scores');
  document.getElementById('rankingsTab').classList.toggle('hidden', tab !== 'rankings');
  document.getElementById('poolsTab').classList.toggle('hidden', tab !== 'pools');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', 
      (i === 0 && tab === 'scores') || 
      (i === 1 && tab === 'rankings') || 
      (i === 2 && tab === 'pools')
    );
  });
  if (tab === 'rankings') loadRankings();
  if (tab === 'pools') {
    loadPools();
    loadRankings(); // Also load rankings for R2 generation
  }
}

async function finalizeRound() {
  try {
    if (!firebaseReady || !db || !currentTourId) {
      alert('Error: Firebase not ready');
      return;
    }

    const result = confirm('Finalize Round 1? This will lock scores and show final rankings.');
    if (!result) return;

    // Get current tournament
    const doc = await db.collection('tournaments').doc(currentTourId).get();
    const data = doc.data();
    
    // Calculate final rankings for R1
    const players = data.players || [];
    const playerStats = {};
    players.forEach(p => {
      playerStats[p] = { wins: 0, losses: 0, pf: 0, pa: 0 };
    });

    // Get all R1 scores
    const scoresSnap = await db.collection('tournaments').doc(currentTourId).collection('scores').get();
    scoresSnap.forEach(scoreDoc => {
      const score = scoreDoc.data();
      const round = score.round || 1;
      
      if (round === 1 && score.t1 && score.t2) {
        score.t1.forEach(p => {
          if (playerStats[p]) {
            playerStats[p].pf += score.s1;
            playerStats[p].pa += score.s2;
            if (score.s1 > score.s2) playerStats[p].wins++;
            else if (score.s1 < score.s2) playerStats[p].losses++;
          }
        });
        
        score.t2.forEach(p => {
          if (playerStats[p]) {
            playerStats[p].pf += score.s2;
            playerStats[p].pa += score.s1;
            if (score.s2 > score.s1) playerStats[p].wins++;
            else if (score.s2 < score.s1) playerStats[p].losses++;
          }
        });
      }
    });

    // Check if pools are even sized
    const poolsJson = data.poolsJson;
    const pools = JSON.parse(poolsJson);
    const poolSizes = [...new Set(pools.map(p => p.length))];
    const isEven = poolSizes.length === 1;

    // Rank players
    const ranked = players.map(p => ({
      name: p,
      ...playerStats[p],
      diff: playerStats[p].pf - playerStats[p].pa
    }));

    if (isEven) {
      ranked.sort((a, b) => {
        if (a.wins !== b.wins) return b.wins - a.wins;
        if (a.losses !== b.losses) return a.losses - b.losses;
        return b.diff - a.diff;
      });
    } else {
      ranked.sort((a, b) => b.diff - a.diff);
    }

    // Display standings
    let standingsHtml = '<table class="score-table"><thead><tr><th>#</th><th>Player</th>';
    if (isEven) {
      standingsHtml += '<th>W</th><th>L</th>';
    }
    standingsHtml += '<th>Diff</th><th>PF</th><th>PA</th></tr></thead><tbody>';
    
    ranked.forEach((r, i) => {
      standingsHtml += `<tr><td>${i + 1}</td><td style="font-weight: 600;">${r.name}</td>`;
      if (isEven) {
        standingsHtml += `<td>${r.wins}W</td><td>${r.losses}L</td>`;
      }
      standingsHtml += `<td>${r.diff > 0 ? '+' : ''}${r.diff}</td><td>${r.pf}</td><td>${r.pa}</td></tr>`;
    });
    
    standingsHtml += '</tbody></table>';
    standingsHtml += '<div style="margin-top: 1rem;"><button class="btn primary" onclick="generateRound2FromRankings()">Generate Round 2 Pools & Post to Players</button></div>';
    
    // Save rankings to Firebase so they persist
    const r1RankingsJson = JSON.stringify(ranked);
    await db.collection('tournaments').doc(currentTourId).update({
      r1RankingsJson: r1RankingsJson,
      r1Finalized: true
    });
    
    console.log('Round 1 finalized and rankings saved to Firebase');
    
    document.getElementById('r1RankingsTable').innerHTML = standingsHtml;
    
    // Hide the finalize button and show success
    document.getElementById('r1FinalizeBtn').style.display = 'none';
    
    alert('✓ Round 1 Finalized! Rankings saved and displayed below.');
  } catch (e) {
    console.error('Error finalizing round:', e);
    alert('Error: ' + e.message);
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function generatePools() {
  try {
    if (!firebaseReady || !db) {
      alert('Firebase not ready');
      return;
    }
    
    if (!currentTourId) {
      alert('No tournament selected');
      return;
    }

    // Check if pools already exist
    const doc = await db.collection('tournaments').doc(currentTourId).get();
    if (doc.data().poolsJson) {
      alert('Pools already generated! Cannot regenerate.');
      return;
    }

    console.log('Generating pools for:', currentTourId);
    const data = doc.data();
    const players = data.players;
    
    if (!players || players.length < 4) {
      alert('Need at least 4 players');
      return;
    }

    const pools = [];
    const shuffled = shuffle(players);
    const maxPoolSize = 5;
    const numPools = Math.ceil(players.length / maxPoolSize);
    
    console.log('Creating', numPools, 'pools');
    
    for (let i = 0; i < numPools; i++) {
      pools.push([]);
    }
    shuffled.forEach((p, i) => pools[i % numPools].push(p));
    
    console.log('Pools created:', pools);

    // Convert pools to JSON string because Firebase doesn't support nested arrays
    const poolsJson = JSON.stringify(pools);

    await db.collection('tournaments').doc(currentTourId).update({
      poolsJson: poolsJson,
      status: 'pools_created'
    });
    
    console.log('Pools saved to Firebase');
    alert('✓ Pools generated!');
    loadPools();
  } catch (e) {
    console.error('Error generating pools:', e);
    alert('Error generating pools: ' + e.message);
  }
}

async function loadPools() {
  try {
    if (!firebaseReady || !db) {
      console.error('Firebase not ready');
      return;
    }
    
    if (!currentTourId) {
      console.error('No tournament ID');
      return;
    }

    console.log('Loading pools for:', currentTourId);
    const doc = await db.collection('tournaments').doc(currentTourId).get();
    
    if (!doc.data()) {
      console.error('Tournament not found');
      document.getElementById('poolsList').innerHTML = '<p style="color: #aaa;">Tournament not found</p>';
      return;
    }

    // Parse pools from JSON string
    const poolsJson = doc.data().poolsJson;
    let pools = [];
    if (poolsJson) {
      pools = JSON.parse(poolsJson);
    }
    console.log('Pools from Firebase:', pools);
    
    let html = '';
    if (pools.length === 0) {
      html = '<p style="color: #aaa;">No pools yet - click "Generate Pools"</p>';
    } else {
      pools.forEach((pool, i) => {
        html += `
          <div class="card">
            <div style="font-weight: 600; margin-bottom: 8px;">Pool ${String.fromCharCode(65 + i)} (${pool.length} players)</div>
            <div style="font-size: 12px; color: #666; line-height: 1.8;">
              ${pool.map((p, j) => `${j + 1}. ${p}`).join('<br/>')}
            </div>
          </div>
        `;
      });
    }
    
    document.getElementById('poolsList').innerHTML = html;
  } catch (e) {
    console.error('Error loading pools:', e);
    document.getElementById('poolsList').innerHTML = '<p style="color: #dc2626;">Error: ' + e.message + '</p>';
  }
}

async function generateRound2() {
  try {
    if (!firebaseReady || !db) {
      alert('Firebase not ready');
      return;
    }
    
    if (!currentTourId) {
      alert('No tournament selected');
      return;
    }

    console.log('Generating Round 2 for:', currentTourId);
    const doc = await db.collection('tournaments').doc(currentTourId).get();
    
    if (!doc.data()) {
      alert('Tournament not found');
      return;
    }

    const data = doc.data();
    
    // Check if Round 2 already exists
    if (data.r2poolsJson) {
      alert('Round 2 pools already generated! Cannot regenerate.');
      return;
    }
    
    const poolsJson = data.poolsJson;
    
    if (!poolsJson) {
      alert('No Round 1 pools yet');
      return;
    }

    const r1pools = JSON.parse(poolsJson);
    const players = data.players;
    
    console.log('Starting R2 generation with players:', players);
    
    // Calculate stats for each player from Round 1 scores
    const playerStats = {};
    players.forEach(p => {
      playerStats[p] = { wins: 0, losses: 0, pf: 0, pa: 0 };
    });

    // Get all scores from Round 1
    const scoresSnap = await db.collection('tournaments').doc(currentTourId).collection('scores').get();
    console.log('Found', scoresSnap.size, 'scores');
    
    scoresSnap.forEach(scoreDoc => {
      const score = scoreDoc.data();
      if (score.t1 && score.t2) {
        score.t1.forEach(p => {
          if (playerStats[p]) {
            playerStats[p].pf += score.s1;
            playerStats[p].pa += score.s2;
            if (score.s1 > score.s2) playerStats[p].wins++;
            else if (score.s1 < score.s2) playerStats[p].losses++;
          }
        });
        
        score.t2.forEach(p => {
          if (playerStats[p]) {
            playerStats[p].pf += score.s2;
            playerStats[p].pa += score.s1;
            if (score.s2 > score.s1) playerStats[p].wins++;
            else if (score.s2 < score.s1) playerStats[p].losses++;
          }
        });
      }
    });

    console.log('Player stats:', playerStats);

    // Check if pools are even sized
    const poolSizes = [...new Set(r1pools.map(p => p.length))];
    const isEven = poolSizes.length === 1;

    // Rank players
    const ranked = players.map(p => ({
      name: p,
      ...playerStats[p],
      diff: playerStats[p].pf - playerStats[p].pa
    }));

    if (isEven) {
      // Even pools - rank by wins, then losses, then diff
      ranked.sort((a, b) => {
        if (a.wins !== b.wins) return b.wins - a.wins;
        if (a.losses !== b.losses) return a.losses - b.losses;
        return b.diff - a.diff;
      });
    } else {
      // Uneven pools - rank by point differential only
      ranked.sort((a, b) => b.diff - a.diff);
    }

    console.log('Ranked players:', ranked);

    // Display standings
    let standingsHtml = '<table class="score-table"><thead><tr><th>#</th><th>Player</th>';
    if (isEven) {
      standingsHtml += '<th>W</th><th>L</th>';
    }
    standingsHtml += '<th>Diff</th><th>PF</th><th>PA</th></tr></thead><tbody>';
    
    ranked.forEach((r, i) => {
      standingsHtml += `<tr><td>${i + 1}</td><td style="font-weight: 600;">${r.name}</td>`;
      if (isEven) {
        standingsHtml += `<td>${r.wins}W</td><td>${r.losses}L</td>`;
      }
      standingsHtml += `<td>${r.diff > 0 ? '+' : ''}${r.diff}</td><td>${r.pf}</td><td>${r.pa}</td></tr>`;
    });
    
    standingsHtml += '</tbody></table>';
    document.getElementById('r1RankingsTable').innerHTML = standingsHtml;

    // Generate Round 2 pools
    const r2pools = [];
    const maxPoolSize = 5;
    const numPools = Math.ceil(players.length / maxPoolSize);
    
    for (let i = 0; i < numPools; i++) {
      r2pools.push([]);
    }

    // Snake draft - distribute ranked players
    ranked.forEach((player, idx) => {
      r2pools[idx % numPools].push(player.name);
    });

    console.log('Generated R2 pools:', r2pools);
    const r2poolsJson = JSON.stringify(r2pools);
    console.log('R2 JSON string:', r2poolsJson);

    // Save Round 2 pools
    await db.collection('tournaments').doc(currentTourId).update({
      r2poolsJson: r2poolsJson,
      status: 'round2'
    });

    console.log('Round 2 saved to Firebase successfully');
    alert('✓ Round 2 pools generated!');
    
    // Refresh display
    loadRound2Pools();
  } catch (e) {
    console.error('Error generating Round 2:', e);
    alert('Error: ' + e.message);
  }
}

async function resetRound2() {
  if (!confirm('Are you sure you want to reset Round 2? This will delete all Round 2 data.')) {
    return;
  }
  
  try {
    if (!firebaseReady || !db || !currentTourId) return;
    
    console.log('Resetting Round 2 for:', currentTourId);
    await db.collection('tournaments').doc(currentTourId).update({
      r2poolsJson: firebase.firestore.FieldValue.delete(),
      status: 'pools_created'
    });
    
    console.log('Round 2 reset');
    alert('✓ Round 2 reset!');
    document.getElementById('round2PoolsList').innerHTML = '<p style="color: #aaa;">No Round 2 pools yet - click "Generate Round 2 Pools"</p>';
    document.getElementById('r1RankingsTable').innerHTML = '';
  } catch (e) {
    console.error('Error resetting Round 2:', e);
    alert('Error: ' + e.message);
  }
}
