<script>
let firebaseReady = false;
let db = null;
let currentTourId = null;
let currentPlayers = [];

// Initialize Firebase
function initFirebase() {
  try {
    console.log('Initializing Firebase...');
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
    console.log('Firebase initialized successfully');
  } catch (e) {
    console.error('Firebase error:', e);
    firebaseReady = false;
  }
}

function backToTourList() {
  document.getElementById('tourSelectScreen').classList.remove('hidden');
  document.getElementById('tourTabsScreen').classList.add('hidden');
  currentTourId = null;
  loadTournamentList();
}

function showTab(tab) {
  document.getElementById('setupTab').classList.toggle('hidden', tab !== 'setup');
  document.getElementById('r1Tab').classList.toggle('hidden', tab !== 'r1');
  document.getElementById('r2Tab').classList.toggle('hidden', tab !== 'r2');
  
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', 
      (i === 0 && tab === 'setup') || 
      (i === 1 && tab === 'r1') || 
      (i === 2 && tab === 'r2')
    );
  });
  
  if (tab === 'r1') loadR1Data();
  if (tab === 'r2') loadR2Data();
}

async function loadTournamentList() {
  try {
    if (!firebaseReady || !db) return;
    
    const snap = await db.collection('tournaments').get();
    let html = '';
    snap.forEach(doc => {
      const data = doc.data();
      html += `
        <div class="tour-item" onclick="openTournament('${doc.id}')">
          <div style="font-weight: 600;">${data.name}</div>
          <div style="font-size: 11px; color: #666;">${data.playerCount} players</div>
        </div>
      `;
    });
    
    if (!html) html = '<div style="padding: 12px; color: #aaa; text-align: center;">No tournaments yet</div>';
    document.getElementById('tourListContainer').innerHTML = html;
  } catch (e) {
    console.error('Error:', e);
  }
}

function showSetup(tourId) {
  currentTourId = tourId;
  currentPlayers = [];
  
  document.getElementById('tourSelectScreen').classList.add('hidden');
  document.getElementById('tourTabsScreen').classList.remove('hidden');
  
  // Reset form
  document.getElementById('tourName').value = '';
  document.getElementById('tourDate').value = '';
  document.getElementById('playerInput').value = '';
  document.getElementById('setupErr').innerHTML = '';
  updatePlayerList();
  
  // Show setup tab
  showTab('setup');
  
  // Load existing tournament if editing
  if (tourId) {
    loadTournamentData(tourId);
  }
}

async function loadTournamentData(tourId) {
  try {
    if (!firebaseReady || !db) return;
    
    const doc = await db.collection('tournaments').doc(tourId).get();
    const data = doc.data();
    
    document.getElementById('tourName').value = data.name;
    document.getElementById('tourDate').value = data.dateTime;
    currentPlayers = data.players || [];
    updatePlayerList();
    
    // Show tabs based on progress
    if (data.poolsJson) {
      document.getElementById('r1TabBtn').style.display = 'block';
      if (!data.r1Finalized) {
        showTab('r1');
      }
    }
    
    if (data.r2poolsJson) {
      document.getElementById('r2TabBtn').style.display = 'block';
    }
  } catch (e) {
    console.error('Error:', e);
  }
}

async function openTournament(tourId) {
  currentTourId = tourId;
  showSetup(tourId);
}

function addPlayer() {
  const name = document.getElementById('playerInput').value.trim();
  if (name && !currentPlayers.includes(name)) {
    currentPlayers.push(name);
    document.getElementById('playerInput').value = '';
    updatePlayerList();
  }
}

function updatePlayerList() {
  const list = document.getElementById('playerList');
  list.innerHTML = currentPlayers.map((p, i) => 
    `<div class="ptag">${p}<span class="x" onclick="removePlayer(${i})">✕</span></div>`
  ).join('');
  document.getElementById('playerCount').textContent = `${currentPlayers.length} players`;
}

function removePlayer(i) {
  currentPlayers.splice(i, 1);
  updatePlayerList();
}

async function saveTournament() {
  const name = document.getElementById('tourName').value.trim();
  const dateInput = document.getElementById('tourDate').value;
  const errEl = document.getElementById('setupErr');
  
  errEl.innerHTML = '';
  
  if (!name || !dateInput) {
    errEl.innerHTML = '<div class="error">Fill in all fields</div>';
    return;
  }
  if (currentPlayers.length < 4) {
    errEl.innerHTML = '<div class="error">Add at least 4 players</div>';
    return;
  }

  const dateObj = new Date(dateInput);
  const date = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + ' at ' + 
               dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

  try {
    if (!currentTourId) {
      currentTourId = Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    await db.collection('tournaments').doc(currentTourId).set({
      id: currentTourId,
      name: name,
      date: date,
      dateTime: dateInput,
      players: currentPlayers,
      playerCount: currentPlayers.length,
      createdAt: new Date(),
      status: 'setup'
    }, { merge: true });
    
    errEl.innerHTML = '<div class="success">✓ Tournament saved!</div>';
    
    // Enable R1 tab
    document.getElementById('r1TabBtn').style.display = 'block';
    
    setTimeout(() => {
      showTab('r1');
    }, 1000);
  } catch (e) {
    console.error('Error:', e);
    errEl.innerHTML = '<div class="error">Error: ' + e.message + '</div>';
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function generateR1Pools() {
  try {
    if (!firebaseReady || !db || !currentTourId) return;
    
    const doc = await db.collection('tournaments').doc(currentTourId).get();
    const data = doc.data();
    
    if (data.poolsJson) {
      alert('Pools already generated!');
      return;
    }
    
    const players = data.players;
    const pools = [];
    const shuffled = shuffle(players);
    const maxPoolSize = 5;
    const numPools = Math.ceil(players.length / maxPoolSize);
    
    for (let i = 0; i < numPools; i++) {
      pools.push([]);
    }
    shuffled.forEach((p, i) => pools[i % numPools].push(p));
    
    const poolsJson = JSON.stringify(pools);
    await db.collection('tournaments').doc(currentTourId).update({
      poolsJson: poolsJson,
      status: 'pools_created'
    });
    
    alert('✓ Round 1 Pools generated!');
    document.getElementById('genR1Btn').style.display = 'none';
    loadR1Data();
  } catch (e) {
    console.error('Error:', e);
    alert('Error: ' + e.message);
  }
}

async function loadR1Data() {
  try {
    if (!firebaseReady || !db || !currentTourId) return;
    
    const doc = await db.collection('tournaments').doc(currentTourId).get();
    const data = doc.data();
    const poolsJson = data.poolsJson;
    
    if (!poolsJson) {
      document.getElementById('r1PoolsStatus').innerHTML = '<p style="color: #aaa;">Pools not yet generated</p>';
      document.getElementById('r1ScoresList').innerHTML = '';
      document.getElementById('genR1Btn').style.display = 'block';
      return;
    }
    
    const pools = JSON.parse(poolsJson);
    const scoresSnap = await db.collection('tournaments').doc(currentTourId).collection('scores').get();
    const scores = {};
    scoresSnap.forEach(scoreDoc => {
      scores[scoreDoc.id] = scoreDoc.data();
    });
    
    // Show pool status
    let statusHtml = '';
    let allComplete = true;
    let gameCounter = 1;
    
    pools.forEach((pool, idx) => {
      const poolLetter = String.fromCharCode(65 + idx);
      const expectedGames = pool.length === 4 ? 3 : 5;
      let completedGames = 0;
      
      statusHtml += `<div class="pool-status">Pool ${poolLetter} (${pool.join(', ')})<br/>`;
      
      for (let i = 1; i <= expectedGames; i++) {
        const gameId = `g${gameCounter}`;
        if (scores[gameId]) completedGames++;
        else allComplete = false;
        gameCounter++;
      }
      
      statusHtml += `${completedGames}/${expectedGames} games complete</div>`;
    });
    
    document.getElementById('r1PoolsStatus').innerHTML = statusHtml;
    
    // Show scores
    let scoresHtml = '';
    let currentGameId = 'g1';
    let gameNum = 1;
    gameCounter = 1;
    
    pools.forEach((pool, idx) => {
      const poolLetter = String.fromCharCode(65 + idx);
      const expectedGames = pool.length === 4 ? 3 : 5;
      
      for (let i = 1; i <= expectedGames; i++) {
        const gameId = `g${gameCounter}`;
        const score = scores[gameId];
        const status = score ? 'complete' : 'pending';
        const statusText = score ? '✓ Complete' : '○ Pending';
        
        scoresHtml += `
          <tr>
            <td>${poolLetter}</td>
            <td>Game ${i}</td>
            <td>${score ? (score.t1 ? score.t1.join(' & ') : '—') : '—'}</td>
            <td style="text-align: center;"><span class="game-status ${status}">${statusText}</span></td>
            <td>${score ? (score.t2 ? score.t2.join(' & ') : '—') : '—'}</td>
          </tr>
        `;
        gameCounter++;
      }
    });
    
    document.getElementById('r1ScoresList').innerHTML = scoresHtml;
    
    // Show finalize button if all complete
    if (allComplete && pools.length > 0) {
      document.getElementById('finalizeR1Btn').style.display = 'block';
    } else {
      document.getElementById('finalizeR1Btn').style.display = 'none';
    }
    
    // Auto refresh
    setTimeout(() => loadR1Data(), 5000);
  } catch (e) {
    console.error('Error:', e);
  }
}

async function finalizeR1() {
  try {
    if (!firebaseReady || !db || !currentTourId) return;
    
    const result = confirm('Finalize Round 1 and generate Round 2 Pools?');
    if (!result) return;
    
    const doc = await db.collection('tournaments').doc(currentTourId).get();
    const data = doc.data();
    const players = data.players;
    
    // Calculate rankings
    const playerStats = {};
    players.forEach(p => {
      playerStats[p] = { wins: 0, losses: 0, pf: 0, pa: 0 };
    });

    const scoresSnap = await db.collection('tournaments').doc(currentTourId).collection('scores').get();
    scoresSnap.forEach(scoreDoc => {
      const score = scoreDoc.data();
      if (score.t1 && score.t2) {
        score.t1.forEach(p => {
          if (playerStats[p]) {
            playerStats[p].pf += score.s1;
            playerStats[p].pa += score.s2;
            if (score.s1 > score.s2) playerStats[p].wins++;
            else playerStats[p].losses++;
          }
        });
        score.t2.forEach(p => {
          if (playerStats[p]) {
            playerStats[p].pf += score.s2;
            playerStats[p].pa += score.s1;
            if (score.s2 > score.s1) playerStats[p].wins++;
            else playerStats[p].losses++;
          }
        });
      }
    });

    const ranked = players.map(p => ({
      name: p,
      ...playerStats[p],
      diff: playerStats[p].pf - playerStats[p].pa
    })).sort((a, b) => {
      if (a.wins !== b.wins) return b.wins - a.wins;
      if (a.losses !== b.losses) return a.losses - b.losses;
      return b.diff - a.diff;
    });

    // Generate R2 pools
    const r1pools = JSON.parse(data.poolsJson);
    const r2pools = [];
    const maxPoolSize = 5;
    const numPools = Math.ceil(players.length / maxPoolSize);
    
    for (let i = 0; i < numPools; i++) {
      r2pools.push([]);
    }
    ranked.forEach((player, idx) => {
      r2pools[idx % numPools].push(player.name);
    });

    const r1RankingsJson = JSON.stringify(ranked);
    const r2poolsJson = JSON.stringify(r2pools);

    await db.collection('tournaments').doc(currentTourId).update({
      r1RankingsJson: r1RankingsJson,
      r1Finalized: true,
      r2poolsJson: r2poolsJson,
      status: 'round2'
    });

    alert('✓ Round 1 Finalized!\n✓ Round 2 Pools Generated!');
    
    // Enable R2 tab and switch to it
    document.getElementById('r2TabBtn').style.display = 'block';
    document.getElementById('finalizeR1Btn').style.display = 'none';
    showTab('r2');
  } catch (e) {
    console.error('Error:', e);
    alert('Error: ' + e.message);
  }
}

    const result = confirm('Finalize Round 2?');
    if (!result) return;
    
    await db.collection('tournaments').doc(currentTourId).update({
      r2Finalized: true,
      status: 'complete'
    });

    alert('✓ Tournament Complete!');
    document.getElementById('finalizeR2Btn').style.display = 'none';
  } catch (e) {
    console.error('Error:', e);
    alert('Error: ' + e.message);
  }
}

// Initialize
window.addEventListener('load', () => {
  initFirebase();
  loadTournamentList();
});
</script>

</body>
