<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brevard Volleyball - Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; }
.app { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
.header { text-align: center; margin-bottom: 2rem; border-bottom: 3px solid #dc2626; padding-bottom: 1rem; }
.header h1 { font-size: 32px; font-weight: 700; color: #dc2626; margin-bottom: 4px; }
.card { background: #fff; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e5e4e0; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
.btn { padding: 10px 16px; font-size: 13px; cursor: pointer; border: 1px solid #d5d4d0; border-radius: 8px; background: #fff; font-weight: 500; }
.btn:hover { background: #f5f4f0; }
.btn.primary { background: #dc2626; color: #fff; border-color: #dc2626; }
.btn.primary:hover { background: #b91c1c; }
input { padding: 8px 12px; border: 1px solid #d5d4d0; border-radius: 6px; font-size: 13px; }
.ptag { display: inline-block; background: #fee2e2; padding: 4px 8px; border-radius: 6px; margin: 3px; font-size: 12px; }
.ptag .x { cursor: pointer; margin-left: 6px; color: #999; }
.plist { padding: 8px; border: 1px dashed #ccc; border-radius: 6px; min-height: 40px; margin: 8px 0; }
.tab-btn { padding: 8px 16px; margin-right: 8px; border: 1px solid #d5d4d0; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
.tab-btn.active { background: #dc2626; color: #fff; border-color: #dc2626; }
.hidden { display: none; }
.pool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
.score-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.score-table th, .score-table td { padding: 8px; text-align: left; border-bottom: 1px solid #f0efe9; }
.score-table th { background: #faf9f7; font-weight: 600; color: #888; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🏐 Brevard Volleyball - Admin</h1>
    <p>Create tournaments, view scores, manage brackets</p>
  </div>

  <!-- Home Screen -->
  <div id="homeScreen">
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div class="card-title">Tournaments</div>
        <button class="btn primary" onclick="showCreateTour()">+ New Tournament</button>
      </div>
    </div>
    <div id="tourList"></div>
  </div>

  <!-- Create Tournament -->
  <div id="createScreen" class="hidden">
    <div style="margin-bottom: 1rem;">
      <button class="btn" onclick="showHome()">← Back</button>
    </div>
    <div class="card">
      <div class="card-title">Create Tournament</div>
      <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">Name</label>
        <input type="text" id="tourName" style="width: 100%;" placeholder="Tournament name"/>
      </div>
      <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">Date/Time</label>
        <input type="text" id="tourDate" style="width: 100%;" placeholder="e.g. Tue 7pm"/>
      </div>
      <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">Add Players</label>
        <div style="display: flex; gap: 8px; margin-bottom: 8px;">
          <input type="text" id="playerInput" style="flex: 1;" placeholder="Player name"/>
          <button class="btn" onclick="addPlayer()">Add</button>
        </div>
        <div class="plist" id="playerList"></div>
        <div style="font-size: 12px; color: #888;" id="playerCount">0 players</div>
      </div>
      <button class="btn primary" onclick="createTournament()">Create Tournament</button>
      <div id="createErr" style="color: #dc2626; margin-top: 8px; font-size: 12px;"></div>
    </div>
  </div>

  <!-- Tournament Detail -->
  <div id="detailScreen" class="hidden">
    <div style="margin-bottom: 1rem;">
      <button class="btn" onclick="showHome()">← Back</button>
    </div>
    <div class="card">
      <div class="card-title" id="detailTitle"></div>
      <div style="display: flex; gap: 8px; margin-bottom: 1rem;">
        <button class="tab-btn active" onclick="showTab('scores')">Scores</button>
        <button class="tab-btn" onclick="showTab('pools')">Pools</button>
      </div>

      <!-- Scores Tab -->
      <div id="scoresTab">
        <table class="score-table">
          <thead>
            <tr><th>Team 1</th><th>Score</th><th>Team 2</th><th>Time</th></tr>
          </thead>
          <tbody id="scoresList"></tbody>
        </table>
      </div>

      <!-- Pools Tab -->
      <div id="poolsTab" class="hidden">
        <button class="btn primary" onclick="generatePools()" style="margin-bottom: 1rem;">Generate Pools</button>
        <div class="pool-grid" id="poolsList"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBQAx2DK8mm7lyGTqaqhWYfTTTBc3DznUg",
  authDomain: "kob-tournament-d7241.firebaseapp.com",
  projectId: "kob-tournament-d7241",
  storageBucket: "kob-tournament-d7241.appspot.com",
  messagingSenderId: "147933432566",
  appId: "1:147933432566:web:9f4377719d51b058b9fad7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentPlayers = [];
let currentTourId = null;

function showScreen(name) {
  document.getElementById('homeScreen').classList.toggle('hidden', name !== 'home');
  document.getElementById('createScreen').classList.toggle('hidden', name !== 'create');
  document.getElementById('detailScreen').classList.toggle('hidden', name !== 'detail');
}

function showHome() {
  showScreen('home');
  loadTournaments();
}

function showCreateTour() {
  currentPlayers = [];
  document.getElementById('tourName').value = '';
  document.getElementById('tourDate').value = '';
  document.getElementById('playerInput').value = '';
  document.getElementById('createErr').textContent = '';
  updatePlayerList();
  showScreen('create');
}

function addPlayer() {
  const name = document.getElementById('playerInput').value.trim();
  if (name && !currentPlayers.includes(name)) {
    currentPlayers.push(name);
    document.getElementById('playerInput').value = '';
    updatePlayerList();
  }
}

function updatePlayerList() {
  const list = document.getElementById('playerList');
  list.innerHTML = currentPlayers.map((p, i) => 
    `<div class="ptag">${p}<span class="x" onclick="removePlayer(${i})">✕</span></div>`
  ).join('');
  document.getElementById('playerCount').textContent = `${currentPlayers.length} players`;
}

function removePlayer(i) {
  currentPlayers.splice(i, 1);
  updatePlayerList();
}

async function createTournament() {
  const name = document.getElementById('tourName').value.trim();
  const date = document.getElementById('tourDate').value.trim();
  
  if (!name || !date) {
    document.getElementById('createErr').textContent = 'Fill in all fields';
    return;
  }
  if (currentPlayers.length < 4) {
    document.getElementById('createErr').textContent = 'Add at least 4 players';
    return;
  }

  const tourId = Math.random().toString(36).substring(2, 8).toUpperCase();
  
  try {
    await db.collection('tournaments').doc(tourId).set({
      id: tourId,
      name: name,
      date: date,
      players: currentPlayers,
      playerCount: currentPlayers.length,
      createdAt: new Date(),
      status: 'setup'
    });
    showHome();
  } catch (e) {
    document.getElementById('createErr').textContent = 'Error: ' + e.message;
  }
}

async function loadTournaments() {
  try {
    const snap = await db.collection('tournaments').get();
    let html = '';
    snap.forEach(doc => {
      const data = doc.data();
      html += `
        <div class="card" style="cursor: pointer;" onclick="openTour('${doc.id}')">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
              <div class="card-title">${data.name}</div>
              <div style="font-size: 12px; color: #666;">${data.playerCount} players · ${data.date}</div>
            </div>
            <div style="font-size: 12px; background: #fee2e2; color: #b91c1c; padding: 4px 8px; border-radius: 6px; font-weight: 600;">${data.status || 'setup'}</div>
          </div>
        </div>
      `;
    });
    if (!html) html = '<div class="card"><p style="text-align: center; color: #aaa;">No tournaments yet</p></div>';
    document.getElementById('tourList').innerHTML = html;
  } catch (e) {
    console.error(e);
  }
}

async function openTour(tourId) {
  currentTourId = tourId;
  const doc = await db.collection('tournaments').doc(tourId).get();
  const data = doc.data();
  document.getElementById('detailTitle').textContent = data.name;
  showScreen('detail');
  loadScores();
}

async function loadScores() {
  try {
    const snap = await db.collection('tournaments').doc(currentTourId).collection('scores').get();
    let html = '';
    snap.forEach(doc => {
      const data = doc.data();
      const time = data.submittedAt ? new Date(data.submittedAt.toDate()).toLocaleTimeString() : '—';
      html += `
        <tr>
          <td>${data.t1 ? data.t1.join(' & ') : '—'}</td>
          <td style="font-weight: 600;">${data.s1 || 0} - ${data.s2 || 0}</td>
          <td>${data.t2 ? data.t2.join(' & ') : '—'}</td>
          <td style="font-size: 11px;">${time}</td>
        </tr>
      `;
    });
    if (!html) html = '<tr><td colspan="4" style="text-align: center; color: #aaa;">No scores yet</td></tr>';
    document.getElementById('scoresList').innerHTML = html;
  } catch (e) {
    console.error(e);
  }
}

function showTab(tab) {
  document.getElementById('scoresTab').classList.toggle('hidden', tab !== 'scores');
  document.getElementById('poolsTab').classList.toggle('hidden', tab !== 'pools');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'scores') || (i === 1 && tab === 'pools'));
  });
  if (tab === 'pools') loadPools();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function generatePools() {
  const doc = await db.collection('tournaments').doc(currentTourId).get();
  const players = doc.data().players;
  const pools = [];
  const shuffled = shuffle(players);
  const maxPoolSize = 5;
  const numPools = Math.ceil(players.length / maxPoolSize);
  
  for (let i = 0; i < numPools; i++) {
    pools.push([]);
  }
  shuffled.forEach((p, i) => pools[i % numPools].push(p));
  
  await db.collection('tournaments').doc(currentTourId).update({
    pools: pools,
    status: 'pools_created'
  });
  
  loadPools();
}

async function loadPools() {
  const doc = await db.collection('tournaments').doc(currentTourId).get();
  const pools = doc.data().pools || [];
  
  let html = '';
  pools.forEach((pool, i) => {
    html += `
      <div class="card">
        <div style="font-weight: 600; margin-bottom: 8px;">Pool ${String.fromCharCode(65 + i)}</div>
        <div style="font-size: 12px; color: #666; line-height: 1.6;">
          ${pool.map((p, j) => `${j + 1}. ${p}`).join('<br/>')}
        </div>
      </div>
    `;
  });
  
  document.getElementById('poolsList').innerHTML = html || '<p style="color: #aaa;">No pools yet</p>';
}

// Load on startup
loadTournaments();
</script>
</body>
</html>
